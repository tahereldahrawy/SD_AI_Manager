{% extends "base.html" %}
{% block title %}Users{% endblock %}
{% block content %}
<h1>Users</h1>

<div class="card narrow">
    <h2>Add user</h2>
    <form method="post" action="/users">
        <label>Name <input name="name" required></label>
        <label>Email <input name="email" type="email" required></label>
        <button type="submit">Create</button>
    </form>
</div>

<div class="card">
    <table>
        <thead>
            <tr><th>Name</th><th>Email</th><th>Subscriptions</th><th>Created</th><th></th></tr>
        </thead>
        <tbody>
        {% for u in users %}
            <tr>
                <td>{{ u.name }}</td>
                <td>{{ u.email }}</td>
                <td>{{ u.subs }}</td>
                <td class="muted">{{ u.created_at }}</td>
                <td>
                    <form method="post" action="/users/{{ u.id }}/delete"
                          onsubmit="return confirm('Delete {{ u.name }}? This frees their seats.');">
                        <button class="danger" type="submit">Delete</button>
                    </form>
                </td>
            </tr>
        {% else %}
            <tr><td colspan="5" class="muted">No users yet.</td></tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
